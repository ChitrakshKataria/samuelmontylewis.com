<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <title>Admin - Samuel Monty Lewis</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <nav>
    <a href="/">Home</a>
    <a href="/archive/">Archive</a>
    <a href="admin.html" class="active">Admin</a>
  </nav>

  <main>
    <p class="section-label">Admin</p>
    <h1>Dashboard</h1>

    <section id="authPanel">
      <form id="authForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="email" required>
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password" required>
        </div>
        <div class="auth-actions">
          <button type="submit" class="btn btn-primary">Sign In</button>
        </div>
        <p class="notice" id="authNotice"></p>
      </form>
    </section>

    <section id="notAdminPanel" class="hidden">
      <p class="empty">Signed in, but this user is not listed as a blog admin.</p>
      <button type="button" class="btn" id="notAdminSignOutBtn">Sign Out</button>
    </section>

    <section id="adminPanel" class="hidden">
      <div class="stats-grid">
        <div class="stat">
          <div class="stat-value" id="statTotal">-</div>
          <div class="stat-label">Total Posts</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="statMonth">-</div>
          <div class="stat-label">This Month</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="statWords">-</div>
          <div class="stat-label">Total Words</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="statAvg">-</div>
          <div class="stat-label">Avg. Words / Post</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="statYear">-</div>
          <div class="stat-label">Posts This Year</div>
        </div>
        <div class="stat stat-accent">
          <div class="stat-value" id="statLatest">-</div>
          <div class="stat-label">Last Published</div>
        </div>
      </div>

      <div class="activity">
        <p class="activity-label">Posts by Month</p>
        <div id="activityBars"></div>
      </div>

      <hr>

      <p class="section-label">About</p>
      <h2>About Me</h2>

      <form id="aboutForm">
        <div class="form-group">
          <label for="aboutField">Bio</label>
          <textarea id="aboutField" placeholder="Skriv litt om dev selv her går på homepagen......."></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
        <p class="notice" id="aboutNotice"></p>
      </form>

      <hr>

      <p class="section-label">New Post</p>
      <h2 id="formTitle">Write</h2>

      <form id="postForm">
        <div class="form-group">
          <label for="title">Title</label>
          <input type="text" id="title" placeholder="Post title" required>
        </div>

        <div class="form-group">
          <label for="slug">Slug</label>
          <input type="text" id="slug" placeholder="post-url-slug" required>
        </div>

        <div class="form-grid">
          <div class="form-group">
            <label for="date">Date</label>
            <input type="date" id="date" required>
          </div>
          <div class="form-group">
            <label for="status">Status</label>
            <select id="status">
              <option value="published">Published</option>
              <option value="draft">Draft</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label for="excerpt">Excerpt</label>
          <input type="text" id="excerpt" placeholder="Short summary">
        </div>

        <div class="form-group">
          <label for="contentField">Content</label>
          <textarea id="contentField" placeholder="Write your post here. Separate paragraphs with a blank line." required></textarea>
          <p class="word-count" id="liveWordCount">0 words</p>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Publish</button>
          <button type="button" class="btn hidden" id="cancelBtn">Cancel</button>
          <button type="button" class="btn" id="signOutBtn">Sign Out</button>
        </div>
        <p class="notice" id="postNotice"></p>
      </form>

      <hr>

      <p class="section-label">All Posts</p>
      <ul class="post-list admin-post-list" id="postList"></ul>
    </section>
  </main>

  <script src="assets/js/config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/app.js"></script>
  <script>SMLBlog.initAdmin();</script>
</body>
</html>
