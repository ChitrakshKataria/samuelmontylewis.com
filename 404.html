<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Writing by Samuel Monty Lewis.">
  <title>Samuel Monty Lewis</title>
  <script>
    const firstPathSegment = location.pathname.split("/").filter(Boolean)[0] || "";
    window.SML_BASE_PATH = location.hostname.endsWith("github.io") &&
      firstPathSegment &&
      !["archive", "posts", "admin", "assets"].includes(firstPathSegment)
      ? "/" + firstPathSegment
      : "";
    const stylesheet = document.createElement("link");
    stylesheet.rel = "stylesheet";
    stylesheet.href = window.SML_BASE_PATH + "/assets/css/styles.css";
    document.head.appendChild(stylesheet);
  </script>
</head>
<body>
  <nav>
    <a href="/" data-href="/" data-route="home">Home</a>
    <a href="/archive/" data-href="/archive/" data-route="archive">Archive</a>
  </nav>

  <main id="app">
    <p class="empty">Loading...</p>
  </main>

  <script>
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement("script");
        script.src = src;
        script.onload = resolve;
        script.onerror = reject;
        document.body.appendChild(script);
      });
    }

    loadScript(window.SML_BASE_PATH + "/assets/js/config.js")
      .then(() => loadScript("https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2").catch(() => undefined))
      .then(() => loadScript(window.SML_BASE_PATH + "/assets/js/app.js"))
      .then(() => SMLBlog.initPublicSite())
      .catch((error) => {
        document.getElementById("app").innerHTML = '<p class="empty">' + error.message + '</p>';
      });
  </script>
</body>
</html>
