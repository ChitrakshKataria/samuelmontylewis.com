<body>

  <main>
    <a href="/" class="back">&lt;- back</a>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="assets/js/app.js"></script>
  <script>
    const legacySlug = new URLSearchParams(location.search).get("slug");
    if (legacySlug && location.pathname.endsWith("/post.html")) {
      history.replaceState(
        {},
        "",
        location.pathname.replace(/post\.html$/, "posts/" + encodeURIComponent(legacySlug) + "/")
      );
    }
    SMLBlog.renderPost();
  </script>
</body>
